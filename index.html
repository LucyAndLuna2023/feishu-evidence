<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>劳动纠纷证据录入</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 600px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      color: #1a73e8;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .info-box {
      background: #e3f2fd;
      border: 1px solid #1976d2;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #1976d2;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
    }

    label.required::after {
      content: ' *';
      color: #f44336;
    }

    input[type="text"],
    input[type="tel"],
    input[type="number"] {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #1a73e8;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #1557b0;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #6c757d;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .evidence-list {
      display: none;
      margin-top: 24px;
    }

    .evidence-list.active {
      display: block;
    }

    .tab-container {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 10px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #666;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tab-btn.active-tab {
      background: #1a73e8;
      color: white;
    }

    .evidence-user-content {
      background: #fff3e0;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .case-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #1a73e8;
    }

    .case-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .case-name {
      font-weight: 700;
      font-size: 18px;
      color: #333;
    }

    .case-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-进行中 {
      background: #e3f2fd;
      color: #1976d2;
    }

    .status-已完成 {
      background: #e8f5e9;
      color: #388e3c;
    }

    .status-待处理 {
      background: #fff3e0;
      color: #e65100;
    }

    .case-info {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }

    .case-info div {
      margin-bottom: 4px;
    }

    .case-progress {
      margin-top: 12px;
    }

    .progress-text {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      text-align: right;
    }

    .back-btn {
      background: #6c757d;
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .evidence-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 4px solid #1a73e8;
      transition: all 0.3s;
    }

    .evidence-item.required {
      border-left-color: #f44336;
      background: #fff8f8;
    }

    .evidence-item.optional {
      border-left-color: #4caf50;
      background: #f8fff8;
    }

    .evidence-item.submitted {
      opacity: 0.7;
      border-left-color: #9e9e9e;
    }

    .evidence-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .evidence-name {
      font-weight: 600;
      font-size: 16px;
      color: #333;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-required {
      background: #ffebee;
      color: #c62828;
    }

    .status-optional {
      background: #e8f5e9;
      color: #388e3c;
    }

    .status-submitted {
      background: #e0e0e0;
      color: #616161;
    }

    .evidence-type {
      display: inline-block;
      padding: 4px 8px;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .evidence-desc {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }

    .evidence-user-content {
      background: #fff3e0;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .evidence-user-content strong {
      color: #e65100;
    }

    .evidence-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      background: #1a73e8;
    }

    .evidence-btn.submitted {
      background: #9e9e9e;
    }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    .success-message {
      background: #d4edda;
      color: #155724;
      padding: 16px;
      border-radius: 10px;
      text-align: center;
      margin-top: 20px;
    }

    .progress-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
      color: white;
    }

    .progress-title {
      font-size: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .progress-stats {
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .stat-item {
      flex: 1;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 4px;
      transition: width 0.5s;
    }

    .login-section {
      text-align: center;
      padding: 20px;
    }

    .login-btn {
      background: #07c160;
      margin-bottom: 16px;
    }

    .login-btn:hover {
      background: #06ad56;
    }

    .user-info {
      background: #f0f4ff;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a73e8;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
    }

    .user-details {
      flex: 1;
    }

    .user-name {
      font-weight: 600;
      color: #333;
    }

    .user-role {
      font-size: 12px;
      color: #666;
    }

    .logout-btn {
      background: transparent;
      color: #f44336;
      border: 1px solid #f44336;
      padding: 8px 16px;
      font-size: 14px;
    }

    .logout-btn:hover {
      background: #f44336;
      color: white;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .back-home {
      background: #6c757d;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 登录区域 -->
    <div id="loginSection" class="login-section">
      <div class="header">
        <h1>📋 劳动纠纷证据录入</h1>
        <p class="subtitle">请先登录您的飞书账号</p>
      </div>

      <div class="info-box">
        💡 请使用与律师约定好的案件编号或手机号登录，登录后可查看和提交您的证据材料。
      </div>

      <button class="btn login-btn" id="loginBtn">
        🦉 使用飞书账号登录
      </button>

      <div id="phoneLoginForm" class="hidden" style="margin-top: 20px; text-align: left;">
        <div class="form-group">
          <label for="loginPhone" class="required">手机号</label>
          <input type="tel" id="loginPhone" placeholder="请输入您的手机号">
        </div>
        <div class="form-group">
          <label for="loginCode" class="required">验证码</label>
          <div style="display: flex; gap: 10px;">
            <input type="text" id="loginCode" placeholder="输入验证码" style="flex:1;">
            <button class="btn" id="loginCodeBtn" type="button" onclick="sendCode()" style="background: #6c757d; white-space: nowrap;">获取验证码</button>
          </div>
        </div>
        <button class="btn" id="confirmLoginBtn">确认登录</button>
        <button class="btn btn-secondary" id="cancelLoginBtn">返回</button>
      </div>
    </div>

    <!-- 主界面 -->
    <div id="mainSection" class="hidden">
      <div class="header">
        <h1>📋 劳动纠纷证据录入</h1>
        <p class="subtitle">您好，<span id="userName">用户</span></p>
      </div>

      <div class="user-info">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <div class="user-name" id="displayUserName">用户名</div>
          <div class="user-role" id="userRole">客户</div>
        </div>
        <button class="btn logout-btn" id="logoutBtn">退出</button>
      </div>

      <!-- 律师/管理员案件列表 -->
      <div id="lawyerPanel" class="hidden" style="margin-top: 20px;">
        <h3 style="margin-bottom: 16px; color: #1a73e8;">📁 我的客户案件</h3>
        <div id="caseList"></div>
        <button class="btn back-btn" onclick="backToCaseList()" style="margin-top: 20px;">🔙 返回案件列表</button>
      </div>

      <!-- 管理员面板 -->
      <div id="adminPanel" class="hidden" style="margin-top: 20px; padding: 16px; background: #fff3e0; border-radius: 12px;">
        <h4 style="color: #e65100; margin-bottom: 12px;">🔧 管理员功能</h4>
        <p style="font-size: 14px; color: #666;">您可以查看所有客户的案件和证据提交情况</p>
      </div>

      <!-- 客户操作区域 -->
      <div id="caseInput">
        <div class="form-group">
          <label for="caseId" class="required">案件编号</label>
          <input type="text" id="caseId" placeholder="请输入您的案件编号，例如：LD-2026-001">
        </div>
        <button class="btn" id="loadBtn">查询我的证据清单</button>
      </div>

      <div id="loading" class="loading hidden">
        <div class="loading-spinner"></div>
        <p>加载中，请稍候...</p>
      </div>

      <div id="evidenceList" class="evidence-list">
        <!-- Tab切换 -->
        <div class="tab-container">
          <button class="tab-btn active-tab" id="tabAll" type="button">📋 全部</button>
          <button class="tab-btn" id="tabSubmitted" type="button">✅ 已提交</button>
          <button class="tab-btn" id="tabPending" type="button">⏳ 待提交</button>
        </div>
        <input type="hidden" id="currentTab" value="all">
      </div>

      <div id="progressSection" class="progress-section hidden">
        <div class="progress-title">📊 证据提交进度</div>
        <div class="progress-stats">
          <div class="stat-item">
            <div class="stat-number" id="requiredTotal">0</div>
            <div class="stat-label">必填证据</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="submittedCount">0</div>
            <div class="stat-label">已提交</div>
          </div>
          <div class="stat-item">
            <div class="stat-number" id="pendingCount">0</div>
            <div class="stat-label">待提交</div>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>

      <div id="evidenceForm" class="hidden">
        <h3 style="margin-bottom: 16px; color: #1a73e8;">📤 提交证据</h3>
        <input type="hidden" id="formEvidenceId">
        <input type="hidden" id="formCaseId">

        <div class="form-group">
          <label>证据类别</label>
          <input type="text" id="formCategory" readonly>
        </div>

        <div class="form-group">
          <label>证据名称</label>
          <input type="text" id="formName" readonly>
        </div>

        <div class="form-group">
          <label class="required">填写说明</label>
          <textarea id="formContent" placeholder="请详细描述您要提交的证据内容，例如：&#10;- 证据来源&#10;- 证据时间&#10;- 证据主要内容&#10;- 需要说明的其他情况"></textarea>
        </div>

        <div class="form-group">
          <label>上传附件（可选）</label>
          <input type="file" id="formFile" accept="image/*,.pdf,.doc,.docx" style="display: none;">
          <button class="btn" id="selectFileBtn" style="background: #6c757d;">📎 选择文件</button>
          <p id="fileName" style="margin-top: 8px; font-size: 14px; color: #666;"></p>
        </div>

        <button class="btn" id="submitBtn">提交证据</button>
        <button class="btn btn-secondary" id="cancelBtn">返回清单</button>
      </div>

      <div id="successMessage" class="success-message hidden">
        ✅ 提交成功！感谢您的配合
      </div>

      <div id="errorMessage" class="error-message hidden"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    function backToCaseList() {
      document.getElementById('lawyerPanel').classList.remove('hidden');
      document.getElementById('caseInput').classList.add('hidden');
      document.getElementById('evidenceList').classList.remove('active');
      document.getElementById('progressSection').classList.add('hidden');
      if (currentUser.role === 'lawyer') {
        renderLawyerCaseList();
      } else if (currentUser.role === 'admin') {
        renderAdminCaseList();
      }
    }
  </script>
</body>
</html>
