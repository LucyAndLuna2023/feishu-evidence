<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>劳动纠纷证据录入系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .status { padding: 10px; border-radius: 5px; background: #e8f5e9; color: #2e7d32; }
        .error { background: #ffebee; color: #c62828; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🏛️ 劳动纠纷证据录入系统</h1>
    <div class="status" id="status">系统运行中</div>
    <p>API 地址: <code id="api"></code></p>
    <script>
        const apiBase = window.location.origin;
        document.getElementById('api').textContent = apiBase;
        
        fetch(apiBase + '/api/health')
            .then(r => r.json())
            .then(d => {
                document.getElementById('status').textContent = '✅ 服务正常: ' + d.time;
            })
            .catch(e => {
                document.getElementById('status').textContent = '❌ 服务异常';
                document.getElementById('status').className = 'error';
            });
    </script>
</body>
</html>
